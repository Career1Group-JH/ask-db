services:
  db:
    image: mariadb:11
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-askdb}
      MARIADB_DATABASE: ${DB_NAME:-co_production}
    volumes:
      - askdb_mariadb_data:/var/lib/mysql
      - ./db/dumps:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/code/app:ro
      - ./.env:/code/.env:ro
      - ./VERSION:/code/VERSION:ro
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      additional_contexts:
        - project_root=.
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  askdb_mariadb_data:
